<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DoDoA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #fafaf8;
      --surface: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b6b;
      --text-muted: #a0a0a0;
      --accent: #2c2c2c;
      --accent-light: #f0ede8;
      --border: #e8e5e0;
      --radius: 12px;
      --transition: 0.2s ease;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Noto Sans Thai', sans-serif;
      background-color: var(--bg);
      color: var(--text-primary);
      line-height: 1.7;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }

    /* ── LAYOUT ── */
    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 0 24px;
    }

    section {
      padding: 80px 0;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--border);
      margin: 0 auto;
    }

    /* ── HERO ── */
    #hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      text-align: center;
      padding: 60px 0;
    }

    .hero-inner {
      width: 100%;
    }

    .hero-tag {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 28px;
      font-weight: 500;
    }

    .hero-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(52px, 12vw, 88px);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      line-height: 1;
      margin-bottom: 16px;
    }

    .hero-subtitle {
      font-size: 18px;
      color: var(--text-secondary);
      font-weight: 300;
      margin-bottom: 24px;
      letter-spacing: 0.04em;
    }

    .hero-desc {
      font-size: 15px;
      color: var(--text-muted);
      max-width: 280px;
      margin: 0 auto 48px;
      line-height: 1.8;
    }

    .btn-cta {
      display: inline-block;
      padding: 14px 40px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      border-radius: 100px;
      letter-spacing: 0.06em;
      transition: background var(--transition), transform var(--transition);
    }

    .btn-cta:hover {
      background: #444;
      transform: translateY(-2px);
    }

    /* ── ABOUT ── */
    #about {
      text-align: center;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 32px;
    }

    .about-text {
      font-size: 17px;
      color: var(--text-secondary);
      line-height: 2;
      font-weight: 300;
      max-width: 400px;
      margin: 0 auto;
    }

    /* ── SOCIAL ── */
    #social {
      text-align: center;
    }

    .social-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 32px;
    }

    .social-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 500;
      transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition);
    }

    .social-link:hover {
      border-color: #ccc;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    }

    .social-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .social-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon-yt  { background: #fff0f0; }
    .icon-tt  { background: #f0f0f0; }
    .icon-fb  { background: #f0f4ff; }
    .icon-ig  { background: #fff0f8; }

    .social-name {
      font-size: 14px;
      color: var(--text-primary);
    }

    .social-handle {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .arrow {
      color: var(--text-muted);
      font-size: 18px;
      line-height: 1;
    }

    /* ── FOOTER ── */
    footer {
      padding: 40px 0 60px;
      text-align: center;
      border-top: 1px solid var(--border);
    }

    footer p {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      section { padding: 64px 0; }
      .social-link { padding: 16px 18px; }
    }
  </style>
</head>
<body>

  <!-- HERO -->
  <section id="hero">
    <div class="container">
      <div class="hero-inner">
        <span class="hero-tag">creator</span>
        <h1 class="hero-name">DoDoA</h1>
        <p class="hero-subtitle">🥇MONEY🥇</p>
        <p class="hero-desc">สอนการเงิน การใช้ชีวิต</p>
        <a href="#social" class="btn-cta">DOWN 👇</a>
      </div>
    </div>
  </section>

  <div class="divider"></div>

  <!-- ABOUT -->
  <section id="about">
    <div class="container">
      <p class="section-label">เกี่ยวกับ</p>
      <p class="about-text">
        แชร์ความรู้เกี่ยวกับการเงิน การใช้ชีวิต และแนวคิดพัฒนาตัวเองแบบเข้าใจง่าย
      </p>
    </div>
  </section>

  <div class="divider"></div>

  <!-- SOCIAL -->
  <section id="social">
    <div class="container">
      <p class="section-label">ช่องทาง ติดต่อ</p>

        <!-- Facebook -->

            <div>

              <div class="social-handle">DoDoA</div>

          </div>
          <span class="arrow">→</span>

        <!-- Instagram -->
        <a href="https://www.instagram.com/dada_a007" target="_blank" rel="noopener" class="social-link">
          <div class="social-left">
            <div class="social-icon icon-ig">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <defs>
                  <radialGradient id="ig-grad" cx="30%" cy="107%" r="150%">
                    <stop offset="0%" stop-color="#ffd600"/>

    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="container">
      <p>ถ้าไม่ติดตามเราอาจจะไม่ได้เจอกันน้า 🤍</p>
    </div>
  </footer>

</body>
</html>
